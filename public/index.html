<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎬 Video Verifier — 抖音视频分析器</title>
  <style>
    :root {
      --bg-primary: #0d1117;
      --bg-secondary: #161b22;
      --bg-input: #21262d;
      --border-color: #30363d;
      --text-primary: #e6edf3;
      --text-secondary: #8b949e;
      --text-muted: #484f58;
      --accent: #58a6ff;
      --accent-hover: #79c0ff;
      --success: #3fb950;
      --warning: #d29922;
      --error: #f85149;
      --stage-download: #a371f7;
      --stage-upload: #79c0ff;
      --stage-analyze: #3fb950;
      --stage-cleanup: #d29922;
      --stage-error: #f85149;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    .container {
      width: 100%;
      max-width: 800px;
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 600;
      margin-bottom: 8px;
    }

    header p {
      color: var(--text-secondary);
      font-size: 0.95rem;
    }

    .card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .input-group {
      margin-bottom: 16px;
    }

    .input-group label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 8px;
      color: var(--text-secondary);
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper input {
      width: 100%;
      padding: 12px 16px;
      padding-right: 48px;
      background: var(--bg-input);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 1rem;
      font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-wrapper input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.2);
    }

    .input-wrapper .toggle-visibility {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1.1rem;
      padding: 4px;
      line-height: 1;
    }

    .input-wrapper .toggle-visibility:hover {
      color: var(--text-secondary);
    }

    .btn-primary {
      width: 100%;
      padding: 14px 24px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
      font-family: inherit;
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--accent-hover);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-primary .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .console-card {
      background: #000;
      border: 1px solid var(--border-color);
      border-radius: 12px;
      overflow: hidden;
    }

    .console-header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .console-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    .console-dot.red { background: #ff5f56; }
    .console-dot.yellow { background: #ffbd2e; }
    .console-dot.green { background: #27c93f; }

    .console-title {
      margin-left: 8px;
      font-size: 0.875rem;
      color: var(--text-secondary);
    }

    .console-body {
      height: 260px;
      overflow-y: auto;
      padding: 16px;
      font-family: "JetBrains Mono", "Fira Code", "Consolas", monospace;
      font-size: 0.85rem;
      line-height: 1.6;
      color: #c9d1d9;
    }

    .console-body::-webkit-scrollbar {
      width: 8px;
    }

    .console-body::-webkit-scrollbar-track {
      background: #0d1117;
    }

    .console-body::-webkit-scrollbar-thumb {
      background: #30363d;
      border-radius: 4px;
    }

    .log-line {
      margin-bottom: 4px;
      opacity: 0;
      animation: fadeIn 0.15s forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    .log-line .stage {
      display: inline-block;
      padding: 1px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
      margin-right: 8px;
      text-transform: uppercase;
    }

    .log-line .stage-download { background: rgba(163, 113, 247, 0.2); color: #a371f7; }
    .log-line .stage-upload { background: rgba(121, 192, 255, 0.2); color: #79c0ff; }
    .log-line .stage-analyze { background: rgba(63, 185, 80, 0.2); color: #3fb950; }
    .log-line .stage-cleanup { background: rgba(210, 153, 34, 0.2); color: #d29922; }
    .log-line .stage-error { background: rgba(248, 81, 73, 0.2); color: #f85149; }

    .log-line .timestamp {
      color: #484f58;
      margin-right: 10px;
      font-size: 0.75rem;
    }

    .log-line.success { color: #3fb950; }
    .log-line.error { color: #f85149; }

    .result-card {
      display: none;
    }

    .result-card.visible {
      display: block;
    }

    .result-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .result-badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.875rem;
      font-weight: 600;
    }

    .result-badge.success {
      background: rgba(63, 185, 80, 0.2);
      color: #3fb950;
    }

    .result-badge.error {
      background: rgba(248, 81, 73, 0.2);
      color: #f85149;
    }

    .result-content {
      background: var(--bg-input);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 16px;
      overflow-x: auto;
    }

    .result-content pre {
      margin: 0;
      font-family: "JetBrains Mono", "Fira Code", "Consolas", monospace;
      font-size: 0.85rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    footer {
      text-align: center;
      margin-top: 32px;
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🎬 Video Verifier</h1>
      <p>抖音视频 AI 分析器 — 基于 Gemini 1.5 Flash</p>
    </header>

    <div class="card">
      <div class="input-group">
        <label for="apiKey">Google AI API Key</label>
        <div class="input-wrapper">
          <input
            type="password"
            id="apiKey"
            placeholder="AIza..."
            autocomplete="off"
          />
          <button class="toggle-visibility" id="toggleKey" title="显示/隐藏">👁</button>
        </div>
      </div>
      <div class="input-group">
        <label for="videoUrl">抖音视频链接</label>
        <div class="input-wrapper">
          <input
            type="text"
            id="videoUrl"
            placeholder="https://v.douyin.com/xxxxx"
            autocomplete="off"
          />
        </div>
      </div>
      <button class="btn-primary" id="analyzeBtn">开始解析</button>
    </div>

    <div class="console-card">
      <div class="console-header">
        <span class="console-dot red"></span>
        <span class="console-dot yellow"></span>
        <span class="console-dot green"></span>
        <span class="console-title">进度控制台</span>
      </div>
      <div class="console-body" id="console">
        <div class="log-line" style="color: #484f58;">等待开始分析...</div>
      </div>
    </div>

    <div class="card result-card" id="resultCard">
      <div class="result-header">
        <span class="result-badge" id="resultBadge">成功</span>
        <span id="resultUrl" style="color: var(--text-secondary); font-size: 0.9rem;"></span>
      </div>
      <div class="result-content">
        <pre id="resultJson"></pre>
      </div>
    </div>

    <footer>
      基于 <a href="https://github.com/284613/video-verifier" target="_blank">video-verifier</a> 构建
    </footer>
  </div>

  <script>
    const apiKeyInput = document.getElementById('apiKey');
    const videoUrlInput = document.getElementById('videoUrl');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const toggleKeyBtn = document.getElementById('toggleKey');
    const consoleEl = document.getElementById('console');
    const resultCard = document.getElementById('resultCard');
    const resultBadge = document.getElementById('resultBadge');
    const resultUrl = document.getElementById('resultUrl');
    const resultJson = document.getElementById('resultJson');

    // Toggle API key visibility
    toggleKeyBtn.addEventListener('click', () => {
      const isPassword = apiKeyInput.type === 'password';
      apiKeyInput.type = isPassword ? 'text' : 'password';
      toggleKeyBtn.textContent = isPassword ? '🙈' : '👁';
    });

    function formatTimestamp(iso) {
      const d = new Date(iso);
      return d.toLocaleTimeString('zh-CN', { hour12: false });
    }

    function appendLog(stage, message, isError = false, isSuccess = false) {
      const line = document.createElement('div');
      line.className = 'log-line' + (isError ? ' error' : '') + (isSuccess ? ' success' : '');

      const stageLabel = stage
        ? `<span class="stage stage-${stage}">${stage}</span>`
        : '';
      const ts = formatTimestamp(new Date().toISOString());

      line.innerHTML = `${stageLabel}<span class="timestamp">[${ts}]</span>${message}`;
      consoleEl.appendChild(line);
      consoleEl.scrollTop = consoleEl.scrollHeight;
    }

    function setButtonState(loading) {
      if (loading) {
        analyzeBtn.disabled = true;
        analyzeBtn.innerHTML = '<span class="spinner"></span>分析中...';
      } else {
        analyzeBtn.disabled = false;
        analyzeBtn.innerHTML = '开始解析';
      }
    }

    function showResult(result) {
      resultCard.classList.add('visible');
      resultBadge.className = 'result-badge ' + (result.success ? 'success' : 'error');
      resultBadge.textContent = result.success ? '分析成功' : '分析失败';
      resultUrl.textContent = result.url;

      if (result.analysis) {
        resultJson.textContent = JSON.stringify(result.analysis, null, 2);
      } else if (result.error) {
        resultJson.textContent = '错误: ' + result.error;
      }
    }

    function resetUI() {
      consoleEl.innerHTML = '<div class="log-line" style="color: #484f58;">等待开始分析...</div>';
      resultCard.classList.remove('visible');
    }

    analyzeBtn.addEventListener('click', async () => {
      const apiKey = apiKeyInput.value.trim();
      const url = videoUrlInput.value.trim();

      if (!apiKey) {
        appendLog('error', '请输入 API Key', true);
        apiKeyInput.focus();
        return;
      }
      if (!url) {
        appendLog('error', '请输入视频链接', true);
        videoUrlInput.focus();
        return;
      }

      resetUI();
      setButtonState(true);
      appendLog('', '🚀 开始分析视频...');

      let eventSource;

      try {
        // Use fetch with streaming
        const response = await fetch('/api/analyze', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ apiKey, url }),
        });

        if (!response.ok) {
          const err = await response.json().catch(() => ({ error: 'Unknown error' }));
          appendLog('error', `请求失败: ${err.error || response.statusText}`, true);
          setButtonState(false);
          return;
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop() || '';

          for (const line of lines) {
            if (line.startsWith('event: ')) {
              const eventType = line.slice(7).trim();
              continue;
            }
            if (line.startsWith('data: ')) {
              try {
                const data = JSON.parse(line.slice(6));
                if (data.stage && data.message) {
                  appendLog(data.stage, data.message, data.stage === 'error');
                } else if (data.success !== undefined) {
                  // Final result event
                  showResult(data);
                }
              } catch (e) {
                // Ignore parse errors for partial data
              }
            }
          }
        }
      } catch (err) {
        appendLog('error', `连接错误: ${err.message}`, true);
      } finally {
        setButtonState(false);
        appendLog('', '✅ 分析完成');
      }
    });

    // Allow Enter key to submit
    videoUrlInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') analyzeBtn.click();
    });
  </script>
</body>
</html>
